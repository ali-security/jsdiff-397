name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Chrome for Testing (pin for Karma Intl.Segmenter)
        run: |
          npx --yes @puppeteer/browsers@latest install chrome@120.0.6099.109 --path /tmp/cft-jsdiff
          echo "CHROME_BIN=$(find /tmp/cft-jsdiff -path '*/chrome-linux64/chrome' -type f | head -1)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests (Mocha + Karma)
        run: yarn grunt test
